<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Music Player | Audio Player 🎵</title>
   <link rel='stylesheet' href='https://use.fontawesome.com/releases/v5.3.1/css/all.css'><link rel="stylesheet" href="./style.css">
  </head>

  <body>
  <div id="player-bg-artwork"></div>
  
 <div id="player-bg-layer"><div class="TexteTitre">ENHYPEN ROMANCE UNTOLD Arcanum</div></div>
<div id="player-container">
  <div id="player">
    <div id="player-track">
      <div id="album-name"></div>
      <div id="track-name"></div>
      <div id="track-time">
        <div id="current-time"></div>
        <div id="track-length"></div>
      </div>
      <div id="seek-bar-container">
        <div id="seek-time"></div>
        <div id="s-hover"></div>
        <div id="seek-bar"></div>
      </div>
    </div>
    <div id="player-content">
      <!--Modification des images de l'album-->
      <div id="album-art">
        <img src="../Images/hq720.jpg" class="active" id="_1" />
        <img src="../Images/ROMANCEUNTOLDDIGITAL_f6489cf7-5646-44a8-9952-1b25fa03a425.png" id="_2" />
        <img src="../Images/1-enhypen-romance-untold.jpg" id="_3" />
        <img src="../Images/enhypen-2nd-full-album-romance-untold-concept-photos-v0-tlrx25h8tq8d1.webp" id="_4" />
        <img src="../Images/621acf07326f1c10186089155551f73a.jpg" id="_5" />
        <img src="../Images/il_fullxfull.6251939368_lqij.jpg" id="_6" />
        <img src="../Images/ENHYPEN-Romance-untold-cr-Courtesy-of-BELIFT-LAB-press-2024-02-b-billboard-1548.jpg" id="_7" />
        <img src="../Images/ENHYPEN-ROMANCE-UNTOLD-Concept-Photo-INCEPTIO-Ver-Photo-Sketch-documents-1.jpeg" id="_8" />
        <img src="../Images/enhypen-romance-untold.webp" id="_9" />
        <div id="buffer-box">Buffering ...</div>
      </div>
      <div id="player-controls">
        <div class="control">
          <div class="button" id="play-previous">
            <i class="fas fa-backward"></i>
          </div>
        </div>
        <div class="control">
          <div class="button" id="play-pause-button">
            <i class="fas fa-play"></i>
          </div>
        </div>
        <div class="control">
          <div class="button" id="play-next">
            <i class="fas fa-forward"></i>
          </div>
        </div>
            </div>
    </div>
  </div>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js'></script><script  src="./script.js"></script>
  </body>
</html>
